services:
  api:
    build: .
    container_name: backend-api
    ports:
      - 5000
    environment:
         - PORT=5000
         - SUPABASE_URL=${SUPABASE_URL}
         - SUPABASE_KEY=${SUPABASE_KEY}
         - JWT_SECRET=${JWT_SECRET}
         - ADMIN_SECRET=${ADMIN_SECRET}
    restart: unless-stopped